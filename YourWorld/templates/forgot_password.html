{% extends "base.html" %}
{% block content %}
<section class="auth-panel">
  <h2>Forgot password</h2>
  <p class="auth-sub">Enter your email to receive a reset code.</p>
  {% if info %}
    <div class="auth-info">{{ info }}</div>
  {% endif %}
  {% if error %}
    <div class="auth-error">{{ error }}</div>
  {% endif %}
  <form class="auth-form" method="post">
    <label>Email</label>
    <input type="email" name="email" required />
    <button class="btn primary" type="submit">Send reset code</button>
  </form>
  <p class="auth-footer">Back to <a href="/login">Login</a>.</p>
</section>
{% endblock %}
