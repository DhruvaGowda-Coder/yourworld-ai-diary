{% extends "base.html" %}
{% block content %}
<section class="auth-panel">
  <h2>Reset password</h2>
  <p class="auth-sub">Enter the code sent to {{ email }} and set a new password.</p>
  {% if info %}
    <div class="auth-info">{{ info }}</div>
  {% endif %}
  {% if error %}
    <div class="auth-error">{{ error }}</div>
  {% endif %}
  <form class="auth-form" method="post">
    <label>Reset code</label>
    <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required />

    <label>New password</label>
    <div class="password-field">
      <input id="resetPassword" type="password" name="password" required />
      <button
        class="password-toggle"
        type="button"
        data-password-toggle
        data-target="resetPassword"
        aria-label="Show password"
        aria-pressed="false"
      >
        Show
      </button>
    </div>

    <label>Confirm password</label>
    <div class="password-field">
      <input id="resetPasswordConfirm" type="password" name="confirm_password" required />
      <button
        class="password-toggle"
        type="button"
        data-password-toggle
        data-target="resetPasswordConfirm"
        aria-label="Show password"
        aria-pressed="false"
      >
        Show
      </button>
    </div>
    <button class="btn primary" type="submit">Reset password</button>
  </form>
  <form class="auth-form" method="post" action="/reset-password/resend">
    <button class="btn ghost" type="submit">Resend code</button>
  </form>
  <p class="auth-footer">Back to <a href="/login">Login</a>.</p>
</section>
{% endblock %}
