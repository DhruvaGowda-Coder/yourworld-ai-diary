{% extends "base.html" %}
{% block content %}
<section class="workspace" data-entry-type="diary">
  <aside class="entry-sidebar">
    <div class="sidebar-header">
      <h3>Private Notes</h3>
      <div class="sidebar-actions">
        <button class="btn ghost" id="newEntryBtn" type="button" title="New Note (Ctrl+N)">New Note</button>
        <button class="btn ghost" id="deleteEntryBtn" type="button" title="Delete Note (Ctrl+D)">Delete</button>
      </div>
    </div>
    <div class="entry-list" id="entryList"></div>
    <div class="story-image-panel">
      <h4>Scene Illustration</h4>
      <input id="imagePrompt" type="text" placeholder="Describe the scene..." />
      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="btn primary" id="imageGenBtn" type="button" style="flex: 1;">Generate AI Image</button>
        <button class="btn ghost" id="imageUploadTriggerBtn" type="button" style="flex: 1;" title="Upload from PC">Upload</button>
        <input type="file" id="imageUploadInput" accept="image/*" style="display: none;" />
      </div>
      <div class="image-actions">
        <button class="btn ghost" id="imageViewBtn" type="button" disabled>View Full</button>
        <button class="btn ghost" id="imageDownloadBtn" type="button" disabled>Download PNG</button>
        <button class="btn ghost" id="imageAttachBtn" type="button" disabled>Insert in Page</button>
      </div>
      <div class="image-preview" id="imagePreview">
        <div class="image-placeholder">No image yet</div>
      </div>
    </div>
  </aside>

  <div class="book-area">
    <div class="status-bar">
      <div class="status-info">
        <span id="saveStatus">Ready</span>
        <span id="pageCount"></span>
        <span id="saveTime"></span>
      </div>
      <div class="status-actions" style="display: flex; align-items: center; gap: 12px;">
        <button class="btn ghost" id="manualSaveBtn" type="button" style="padding: 4px 10px; font-size: 0.8rem;" title="Save (Ctrl+S)">Save</button>
        <label class="autosave-toggle">
          <input type="checkbox" id="autosaveToggle" />
          <span class="autosave-track"></span>
          <span class="autosave-label">Autosave</span>
        </label>
      </div>
    </div>
    <div class="editor-toolbar" id="editorToolbar" aria-label="Text formatting">
      <button class="tool-btn" id="formatBoldBtn" type="button" title="Bold (Ctrl+B)">B</button>
      <button class="tool-btn" id="formatItalicBtn" type="button" title="Italic (Ctrl+I)">I</button>
      <button class="tool-btn" id="formatUnderlineBtn" type="button" title="Underline (Ctrl+U)">U</button>
      <label class="tool-size" for="fontSizeSelect">Size</label>
      <select id="fontSizeSelect" class="tool-select" aria-label="Font size">
        <option value="0.9">Small</option>
        <option value="1.05" selected>Normal</option>
        <option value="1.25">Medium</option>
        <option value="1.45">Large</option>
        <option value="1.75">XL</option>
      </select>
    </div>
    <div class="book" id="book">
      <div class="page" id="page">
        <div class="page-scroll">
          <input id="entryTitle" class="page-title" placeholder="Note title..." />
          <textarea id="entryContent" class="page-content" placeholder="Start writing..."></textarea>
          <div class="page-illustrations" id="pageIllustrations">
            <!-- Multiple illustrations will be injected here -->
          </div>
      </div>
      <div class="page-turn" id="pageTurn"></div>
    </div>
    <div class="page-controls">
      <button class="btn ghost" id="prevEntryBtn" type="button" title="Previous Note (Ctrl+Left)">Previous</button>
      <button class="btn ghost" id="nextEntryBtn" type="button" title="Next Note (Ctrl+Right)">Next</button>
    </div>
  </div>
</section>
{% endblock %}
